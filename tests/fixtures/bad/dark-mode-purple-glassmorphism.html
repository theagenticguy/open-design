<!doctype html>
<html lang="en">
<head>

<title>The Future of Productivity</title>
<style>
:root {
  --accent: #a855f7;
}
body {

  margin: 0;
}
.hero {
  text-align: center;

.cta { background: #6366f1; color: white; padding: 1rem 2rem; border-radius: 999px; }

</html>
